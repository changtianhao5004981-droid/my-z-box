<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新闻页面</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/news.css">
</head>
<body>
  <div class="topnav">
    <a href="index.html">Aichat</a>
    <a href="donation.html">关于</a>
    <a href="linksearch.html">网盘</a>
    <a href="news.html">新闻</a>
    <a href="others.html">其它</a>
  </div>

  <div class="news-page">
    <h1>最新新闻</h1>
    <div id="news-container"></div>
    <button id="load-more" onclick="loadMoreNews()" style="display: none;">加载更多</button>
  </div>

  <script>
    let allNews = [];
    let currentIndex = 0;
    const batchSize = 10;
  
    async function fetchNews() {
      try {
        const response = await fetch('/api/news');
        const data = await response.json();
        if (data.error) {
          console.error('Error fetching news:', data.error);
          return [];
        }
        // The API returns data in 'items' array, not 'data'
        return data.items || data.data || [];
      } catch (error) {
        console.error('Error:', error);
        return [];
      }
    }
  
    function renderNews() {
      const container = document.getElementById('news-container');
      const nextBatch = allNews.slice(currentIndex, currentIndex + batchSize);
      
      nextBatch.forEach(item => {
        const div = document.createElement('div');
        div.classList.add('news-item');
        const detailUrl = `newsDetail.html?id=${item.id}&title=${encodeURIComponent(item.title)}&url=${encodeURIComponent(item.url || '')}`;
        div.innerHTML = `
          <h3><a href="${detailUrl}" target="_self">${item.title}</a></h3>
          <p class="news-summary">${item.summary || item.description || ''}</p>
          <small class="news-date">${item.publish_time || item.date || ''}</small>
        `;
        container.appendChild(div);
      });
      
      currentIndex += batchSize;
      
      // Show/hide load more button
      const loadMoreBtn = document.getElementById('load-more');
      if (currentIndex >= allNews.length) {
        loadMoreBtn.style.display = 'none';
      } else {
        loadMoreBtn.style.display = 'block';
      }
    }
  
    async function loadNews() {
      const container = document.getElementById('news-container');
      container.innerHTML = '<p>正在加载新闻...</p>';
      
      allNews = await fetchNews();
      
      if (allNews.length === 0) {
        container.innerHTML = '<p>没有新闻数据。</p>';
        document.getElementById('load-more').style.display = 'none';
        return;
      }
      
      currentIndex = 0;
      container.innerHTML = '';
      renderNews();
    }
  
    function loadMoreNews() {
      renderNews();
    }
  
    // 页面加载时先加载新闻
    loadNews();
  </script>
  <script src="js/password.js"></script>
      <script src="js/auth.js"></script>
</body>
</html>
