<body>

<!-- ChatGPT-style card slider -->
<div class="card-slider-wrapper">
  
  <div class="card-slider" id="cardSlider">

    <!-- 1. 单词查询 (保持功能，UI在JS里修改) -->
    <section data-index="0" class="slide dictionary">
      <h1>单词查询</h1>
      <input class="search" type="text" id="wordInput" placeholder="Enter a word to search..." />
      <button onclick="searchWord()">Search</button>
      <div id="result"></div>
    </section>

    <!-- 2. 每日壁纸 (完美替换原先的为爱发电) -->
    <section data-index="1" id="wallpaperSection" class="slide wallpaper-slide">
      <h1>每日壁纸</h1>
      <div class="wallpaper-controls" style="margin-bottom: 15px; display: flex; justify-content: center; align-items: center; gap: 8px;">
        <select id="wallpaperSize" style="padding: 6px; border-radius: 4px; border: 1px solid #ccc; background: #fff; cursor: pointer;">
          <option value="UHD">超高清 (UHD)</option>
          <option value="1920x1080">电脑标准 (1920x1080)</option>
          <option value="720x1280">手机竖屏 (720x1280)</option>
          <option value="1366x768">普通笔电 (1366x768)</option>
        </select>
        <button type="button" id="loadWallpaperBtn" onclick="loadBingWallpaper()" style="padding: 6px 12px; background: #10a37f; color: white; border: none; border-radius: 4px; cursor: pointer;">加载</button>
      </div>
      <div class="wallpaper-container" style="width: 90%; max-width: 500px; margin: 0 auto; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); position: relative; background: #f3f4f6; min-height: 250px;">
        <img id="bingImage" src="" alt="点击加载必应壁纸" style="width: 100%; height: auto; display: block; opacity: 0; transition: opacity 0.3s ease;" />
        <div id="wallpaperTitle" style="position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.6); color: white; padding: 8px; font-size: 12px; display: none; text-align: center;"></div>
      </div>
    </section>

    <!-- 3. 短视频 (对齐微信端：标题“抖音”，按钮“戳”) -->
    <section data-index="2" class="slide short-video">
      <h1>抖音</h1>
      <div class="video-controls">
      <select id="videoCategory">
        <option value="jk">JK</option>
        <option value="YuMeng">欲梦</option>
        <option value="NvDa">女大</option>
        <option value="NvGao">女高</option>
        <option value="ReWu">热舞</option>
        <option value="QingCun">清纯</option>
        <option value="SheJie">蛇姐</option>
        <option value="ChuanDa">穿搭</option>
        <option value="GaoZhiLiangXiaoJieJie">高质量小姐姐</option>
        <option value="HanFu">汉服</option>
        <option value="HeiSi">黑丝</option>
        <option value="BianZhuang">变装</option>
        <option value="LuoLi">萝莉</option>
        <option value="TianMei">甜妹</option>
        <option value="BaiSi">白丝</option>
      </select>
      <button type="button" id="loadVideoBtn">戳</button>
    </div>
      <video id="videoPlayer" controls autoplay style="margin-top: 20px; width: 90%; max-width: 500px;"></video>
    </section>

  </div>
  
  <div class="dots">
    <span onclick="goToSlide(0)" class="dot active" title="Dictionary"></span>
    <span onclick="goToSlide(1)" class="dot" title="Wallpaper"></span>
    <span onclick="goToSlide(2)" class="dot" title="Short Videos"></span>
  </div>
</div>

<script src="js/others.js" ></script>
<script src="js/password.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
